#########################
# Gatling Configuration #
#########################

gatling {
  core {
    encoding = "utf-8"
    shutdownTimeout = 10000
  }

  charting {
    maxPlotPerSeries = 1000
    indicators {
      lowerBound = 800
      higherBound = 1200
      percentile1 = 50
      percentile2 = 75
      percentile3 = 95
      percentile4 = 99
    }
  }

  http {
    requestTimeout = 60000
    pooledConnectionIdleTimeout = 60000
  }

  data {
    writers = [console, file]
    utcDateTime = true
    console {
      light = false
      writePeriod = 5
    }
  }
}
